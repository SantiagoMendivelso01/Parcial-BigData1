name: CI/CD Pipeline - Chinook Music Store (Angular)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (PyTest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest app/tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=50
        env:
          PYTHONPATH: .
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: test
          SECRET_KEY: test-secret-key

  frontend-tests:
    name: Frontend Tests (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Angular tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

  deploy-backend:
    name: Deploy Backends to EC2
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 44.221.59.22
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            sudo apt update
            sudo apt install -y python3-pip tmux

            if [ ! -d "$HOME/Parcial-Corte1" ]; then
              git clone https://github.com/${{ github.repository }} ~/Parcial-Corte1
            fi

            cd ~/Parcial-Corte1
            git pull origin main

            cd backend

            cat > .env << EOF
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EOF

            python3 -m pip install -r requirements.txt --break-system-packages

            tmux kill-session -t backend || true

            tmux new -d -s backend "python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

            echo "✅ Backend deployed"

  deploy-frontend:
    name: Deploy Angular Frontend to EC2
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Angular
        working-directory: ./frontend
        run: |
          npm install
          npm run build -- --configuration=production

      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 32.192.89.232
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/chinook-frontend/browser/*"
          target: "/tmp/chinook-dist"
          strip_components: 4

      - name: Activate build
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 32.192.89.232
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/chinook-dist/* /var/www/html/
            sudo systemctl restart nginx
            echo "✅ Angular frontend deployed"