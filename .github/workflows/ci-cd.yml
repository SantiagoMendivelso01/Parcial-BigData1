name: CI/CD Pipeline - Chinook Music Store (Angular)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (PyTest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest app/tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=50
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: test
          SECRET_KEY: test-secret-key

  frontend-tests:
    name: Frontend Tests (Angular Karma)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Angular tests (headless Chrome)
        run: npm test -- --watch=false --browsers=ChromeHeadless

  deploy-backend:
    name: Deploy Backend to EC2
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 35.170.64.92
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Parcial-Corte1
            git pull origin main
            cd backend

            cat > .env << EOF
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EOF

            pip install -r requirements.txt --break-system-packages
            sudo systemctl restart chinook-backend
            echo "✅ Backend deployed"

  deploy-frontend:
    name: Deploy Angular Frontend to EC2
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Angular app
        working-directory: ./frontend
        run: |
          npm install
          npm run build -- --configuration=production

      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 3.235.229.64
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/chinook-frontend/*"
          target: "/tmp/chinook-dist"
          strip_components: 3

      - name: Activate build on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 3.235.229.64
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/chinook-dist/* /var/www/html/
            sudo systemctl restart nginx
            echo "✅ Angular frontend deployed"
